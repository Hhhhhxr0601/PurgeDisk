name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macOS ARM64
          - os: macos-latest
            target: x86_64-apple-darwin
            label: macOS x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows x86_64
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: Linux x86_64

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.label }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm ci --prefix src-gui

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: PurgeDisk ${{ github.ref_name }}
          releaseBody: |
            ## PurgeDisk ${{ github.ref_name }}

            企业级 U 盘数据合规销毁工具 — DoD 5220.22-M 标准

            ### 下载说明
            | 平台 | 文件 |
            |------|------|
            | macOS (Apple Silicon) | `PurgeDisk_*_aarch64.dmg` |
            | macOS (Intel) | `PurgeDisk_*_x64.dmg` |
            | Windows | `PurgeDisk_*_x64-setup.exe` |
            | Linux / 麒麟 | `PurgeDisk_*_amd64.deb` |
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}
